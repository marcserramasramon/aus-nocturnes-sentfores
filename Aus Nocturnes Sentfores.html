  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

00 — page */\n  --container-xl:  87.5rem; /* 1400 — wide */\n\n  /* Section rhythm */\n  --section-pad-y: var(--space-11);\n  --gutter:        var(--space-5);\n\n  /* Breakpoints (reference values) */\n  --bp-sm: 640px;\n  --bp-md: 768px;\n  --bp-lg: 1024px;\n  --bp-xl: 1280px;\n\n  /* Touch targets */\n  --tap-min: 44px;\n}\n</style>\n  <style>/* ============================================================\n   Arrels — Effects: radii, shadows, motion\n   Soft organic rounding, low warm shadows (never harsh black),\n   gentle grow-in motion. Nothing bounces hard; everything eases.\n   ============================================================ */\n\n:root {\n  /* Corner radii — pebble-soft, never sharp */\n  --radius-xs:  4px;\n  --radius-sm:  8px;\n  --radius-md:  12px;\n  --radius-lg:  18px;\n  --radius-xl:  26px;\n  --radius-2xl: 36px;\n  --radius-pill: 999px;\n\n  /* Shadows — warm-tinted (green/olive black), soft & diffuse */\n  --shadow-xs:  0 1px 2px rgba(16, 35, 26, 0.06);\n  --shadow-sm:  0 2px 6px rgba(16, 35, 26, 0.07);\n  --shadow-md:  0 6px 18px rgba(16, 35, 26, 0.09);\n  --shadow-lg:  0 14px 36px rgba(16, 35, 26, 0.12);\n  --shadow-xl:  0 26px 60px rgba(16, 35, 26, 0.16);\n\n  /* Colored glow — for accent CTAs & hovers */\n  --glow-green: 0 8px 24px rgba(31, 168, 92, 0.28);\n  --glow-sun:   0 8px 24px rgba(242, 180, 23, 0.30);\n\n  /* Inner shadow (sunken inputs/wells) */\n  --shadow-inset: inset 0 1px 3px rgba(16, 35, 26, 0.08);\n\n  /* Focus ring */\n  --ring-width: 3px;\n  --ring: 0 0 0 var(--ring-width) rgba(56, 187, 111, 0.45);\n\n  /* Motion — organic easing */\n  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);   /* @kind other */\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);  /* @kind other */\n  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1); /* @kind other */\n\n  --dur-fast:   140ms;  /* @kind other */\n  --dur-normal: 240ms;  /* @kind other */\n  --dur-slow:   420ms;  /* @kind other */\n\n  /* Layering */\n  --z-base: 1;       /* @kind ht-extra:    800;\n\n  /* Type scale (fluid-friendly base = 16px) */\n  --text-xs:   0.75rem;   /* 12 */\n  --text-sm:   0.875rem;  /* 14 */\n  --text-base: 1rem;      /* 16 */\n  --text-md:   1.125rem;  /* 18 */\n  --text-lg:   1.375rem;  /* 22 */\n  --text-xl:   1.75rem;   /* 28 */\n  --text-2xl:  2.25rem;   /* 36 */\n  --text-3xl:  3rem;      /* 48 */\n  --text-4xl:  4rem;      /* 64 */\n  --text-5xl:  5.25rem;   /* 84 */\n\n  /* Line heights */\n  --leading-tight:   1.05;\n  --leading-snug:    1.2;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.7;\n\n  /* Letter spacing */\n  --tracking-tight:  -0.03em;\n  --tracking-snug:   -0.015em;\n  --tracking-normal: 0em;\n  --tracking-wide:   0.02em;\n  --tracking-caps:   0.14em; /* mono eyebrows, uppercase labels */\n\n  /* Semantic roles */\n  --display-family: var(--font-display);\n  --display-weight: var(--weight-bold);\n  --display-tracking: var(--tracking-tight);\n\n  --heading-family: var(--font-display);\n  --heading-weight: var(--weight-semibold);\n\n  --body-family: var(--font-body);\n  --body-weight: var(--weight-regular);\n  --body-leading: var(--leading-relaxed);\n\n  --eyebrow-family: var(--font-mono);\n  --eyebrow-weight: var(--weight-medium);\n  --eyebrow-tracking: var(--tracking-caps);\n}\n\n/* ============================================================\n   Arrels — Spacing & Layout\n   8px base rhythm with a 4px half-step. Organic, generous\n   whitespace — the brand breathes.\n   ============================================================ */\n\n:root {\n  --space-0:   0;\n  --space-1:   0.25rem;  /* 4  */\n  --space-2:   0.5rem;   /* 8  */\n  --space-3:   0.75rem;  /* 12 */\n  --space-4:   1rem;     /* 16 */\n  --space-5:   1.5rem;   /* 24 */\n  --space-6:   2rem;     /* 32 */\n  --space-7:   2.5rem;   /* 40 */\n  --space-8:   3rem;     /* 48 */\n  --space-9:   4rem;     /* 64 */\n  --space-10:  5rem;     /* 80 */\n  --space-11:  7rem;     /* 112 */\n  --space-12:  9rem;     /* 144 */\n\n  /* Container widths */\n  --container-sm:  40rem;   /* 640  — reading */\n  --container-md:  60rem;   /* 960  — content */\n  --container-lg:  75rem;   /* 1200 — page */\n  --container-xl:  87.5rem; /* 1400 — wide */\n\n  /* Section rhythm */\n  --section-pad-y: var(--space-11);\n  --gutter:        var(--space-5);\n\n  /* Breakpoints (reference values) */\n  --bp-sm: 640px;\n  --bp-md: 768px;\n  --bp-lg: 1024px;\n  --bp-xl: 1280px;\n\n  /* Touch targets */\n  --tap-min: 44px;\n}\n\n/* ============================================================\n   Arrels — Effects: radii, shadows, motion\n   Soft organic rounding, low warm shadows (never harsh black),\n   gentle grow-in motion. Nothing bounces hard; everything eases.\n   ============================================================ */\n\n:root {\n  /* Corner radii — pebble-soft, never sharp */\n  --radius-xs:  4px;\n  --radius-sm:  8px;\n  --radius-md:  12px;\n  --radius-lg:  18px;\n  --radius-xl:  26px;\n  --radius-2xl: 36px;\n  --radius-pill: 999px;\n\n  /* Shadows — warm-tinted (green/olive black), soft & diffuse */\n  --shadow-xs:  0 1px 2px rgba(16, 35, 26, 0.06);\n  --shadow-sm:  0 2px 6px rgba(16, 35, 26, 0.07);\n  --shadow-md:  0 6px 18px rgba(16, 35, 26, 0.09);\n  --shadow-lg:  0 14px 36px rgba(16, 35, 26, 0.12);\n  --shadow-xl:  0 26px 60px rgba(16, 35, 26, 0.16);\n\n  /* Colored glow — for accent CTAs & hovers */\n  --glow-green: 0 8px 24px rgba(31, 168, 92, 0.28);\n  --glow-sun:   0 8px 24px rgba(242, 180, 23, 0.30);\n\n  /* Inner shadow (sunken inputs/wells) */\n  --shadow-inset: inset 0 1px 3px rgba(16, 35, 26, 0.08);\n\n  /* Focus ring */\n  --ring-width: 3px;\n  --ring: 0 0 0 var(--ring-width) rgba(56, 187, 111, 0.45);\n\n  /* Motion — organic easing */\n  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);   /* @kind other */\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);  /* @kind other */\n  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1); /* @kind other */\n\n  --dur-fast:   140ms;  /* @kind other */\n  - \"round\"></path></symbol>\n    <symbol id=\"ic-eye\" viewBox=\"0 0 24 24\"><path d=\"M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7Z\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path><circle cx=\"12\" cy=\"12\" r=\"3.2\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"></circle></symbol>\n    <symbol id=\"ic-handshake\" viewBox=\"0 0 24 24\"><path d=\"M2 12l4-3 4 3 3-2 3 2 4-3 2 2-5 5-4-2-3 2-4-2-4-2Z\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path></symbol>\n  </defs>\n</svg>\n\n<div style=\"position:relative\">\n\n  <div class=\"stars\" id=\"stars\">\n    <sc-for list=\"{{ stars }}\" as=\"st\" hint-placeholder-count=\"0\">\n      <i style=\"left:{{ st.left }}%;top:{{ st.top }}%;animation-delay:{{ st.delay }}s\"></i>\n    </sc-for>\n  </div>\n\n  <!-- ============ NAV ============ -->\n  <header data-screen-label=\"Nav\" style=\"position:sticky;top:0;z-index:100;background:rgba(10,14,31,0.72);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.1)\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;gap:24px\">\n      <div style=\"display:flex;align-items:center;gap:10px\" data-owl-perch=\"logo\">\n        <span style=\"display:inline-flex;color:var(--green-500)\"><svg width=\"28\" height=\"28\"><use href=\"#ic-owl\"></use></svg></span>\n        <div style=\"display:flex;flex-direction:column;line-height:1.1\">\n          <span style=\"font-family:var(--font-display);font-weight:800;font-size:19px;letter-spacing:-0.03em;color:var(--cream-50)\">Aus nocturnes Sentfores</span>\n          <span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;color:rgba(244,242,231,0.55);text-transform:uppercase\">UrbisAvis</span>\n        </div>\n      </div>\n      <nav style=\"display:flex;gap:30px\">\n        <a href=\"#projecte\" style=\"font-size:15px;font-weight:500;color:rgba(244,242,231,0.85);text-decoration:none\">El projecte</a>\n        <a href=\"#especies\" style=\"font-size:15px;font-weight:500;color:rgba(244,242,231,0.85);text-decoration:none\">Els 4 caçadors</a>\n        <a href=\"#colabora\" style=\"font-size:15px;font-weight:500;color:rgba(244,242,231,0.85);text-decoration:none\">Fes-hi un cop de mà</a>\n      </nav>\n      <a href=\"#colabora\" style=\"text-decoration:none\">\n        <x-import component-from-global-scope=\"ArrelsNatureDesignSystem_1fc6c4.Button\" variant=\"primary\" size=\"sm\" hint-size=\"auto,36px\">Fes-hi un cop de mà</x-import>\n      </a>\n    </div>\n  </header>\n\n  <!-- ============ HERO ============ -->\n  <section data-screen-label=\"Hero\" style=\"position:relative;background:transparent;color:var(--cream-50);overflow:hidden\">\n    <div style=\"position:absolute;inset:0;background:radial-gradient(1.5px 1.5px at 20% 30%, rgba(255,255,255,.35) 50%, transparent), radial-gradient(1.5px 1.5px at 62% 18%, rgba(255,255,255,.28) 50%, transparent), radial-gradient(1px 1px at 85% 42%, rgba(255,255,255,.3) 50%, transparent), radial-gradient(1px 1px at 42% 62%, rgba(255,255,255,.22) 50%, transparent);pointer-events:none\"></div>\n    <div style=\"max-width:1200px;margin:0 auto;padding:96px 32px 110px;position:relative;display:grid;grid-template-columns:1.15fr 0.85fr;gap:56px;align-items:center\">\n      <div>\n        <div style=\"display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap\">\n          <x-import component-from-global-scope=\"ArrelsNatureDesignSystem_1fc6c4.Badge\" tone=\"green\" solid=\"{{ true }}\" hint-size=\"auto,24px\">Ciència ciutadana oberta</x-import>\n          <x-import component-from-global-scope=\"ArrelsNatureDesignSystem_1fc6c4.Badge\" tone=\"sky\" hint-size=\"auto,24px\">Sentfores · La Guixa · Vic</x-import>\n        </div>\n        <h1 data-owl-perch=\"hero-h1\" style=\"font-family:var(--font-display);font-weight:800;font-size:clamp(2.6rem, 5vw, 4.2rem);line-height:1.02;letter-spacing:-0.035em;margin:0 0 22px\">\n          La nit dels rapinyaires, a prop del poble.\n        </h1>\n        <p style=\"font-size:18px;line-height:1.6;color:rgba(244,242,231,0.82);max-width:560px;margin:0 0 32px\">\n          Quan el poble es dorm, la natura s'encén. Més enllà dels nostres teulats i camps, una comunitat alada vigila en el silenci. \"Aus nocturnes Sentfores\" és una iniciativa de ciència ciutadana que obre una finestra respectuosa al món ocult dels rapinyaires nocturns. A través de 3 càmeres d'infrarojos, connectem l'escola, el veïnat i la recerca per conèixer, estimar i protegir els nostres veïns més discrets. Sense molestar-los, compartint la mateixa nit.\n        </p>\n        <div style=\"display:flex;gap:12px;flex-wrap:wrap\">\n          <a href=\"#projecte\" style=\"text-decoration:none\">\n            <x-import component-from-global-scope=\"ArrelsNatureDesignSystem_1fc6c4.Button\" variant=\"primary\" size=\"lg\" hint-size=\"auto,56px\">Descobreix el projecte ↓</x-import>\n          </a>\n          <a href=\"#colabora\" style=\"text-decoration:none\">\n            <x-import component-from-global-scope=\"ArrelsNatureDesignSystem_1fc6c4.Button\" variant=\"inverse\" size=\"lg\" hint-size=\"auto,56px\">Vull col·laborar-hi</x-import>\n          </a>\n        </div>\n        <div style=\"display:flex;gap:44px;margin-top:48px;flex-wrap:wrap\">\n          <div style=\"display:flex;flex-direction:column;gap:4px\">\n            <span style=\"font-family:var(--font-display);font-weight:700;font-size:3rem;line-height:1;letter-spacing:-0.03em;color:var(--green-300)\">3</span>\n            <span style=\"font-family:var(--font-mono);font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.12em;color:rgba(244,242,231,0.6)\">Càmeres HD (IR)</span>\n          </div>\n          <div style=\"display:flex;flex-direction:column;gap:4px\">\n            <span style=\"font-family:var(--font-display);font-weight:700;font-size:3rem;line-height:1;letter-spacing:-0.03em;color:var(--green-300)\">4</span>\n            <span style=\"font-family:var(--font-mono);font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.12em;color:rgba(244,242,231,0.6)\">Espècies aliades</span>\n          </div>\n          <div style=\"display:flex;flex-direction:column;gap:4px\">\n            <span style=\"font-family:var(--font-display);font-weight:700;font-size:3rem;line-height:1;letter-spacing:-0.03em;color:var(--green-300)\">6</span>\n            <span style=\"font-family:var(--font-mono);font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.12em;color:rgba(244,242,231,0.6)\">Plafons de la ruta</span>\n          </div>\n        </div>\n      </div>\n\n      <!-- animated night landscape module -->\n      <div style=\"position:relative;aspect-ratio:4/3;border-radius:var(--radius-xl);overflow:hidden;border:1px solid rgba(255,255,255,0.1);box-shadow:var(--shadow-xl);background:linear-gradient(180deg,#0d2016 0%,#0a1810 60%,#060f0a 100%)\">\n        <div style=\"position:absolute;inset:0;background:radial-gradient(1.2px 1.2px at 15% 20%, rgba(255,255,255,.8) 50%, transparent), radial-gradient(1px 1px at 35% 12%, rgba(255,255,255,.6) 50%, transparent), radial-gradient(1.4px 1.4px at 55% 25%, rgba(255,255,255,.7) 50%, transparent), radial-gradient(1px 1px at 75% 15%, rgba(255,255,255,.5) 50%, transparent), radial-gradient(1.2px 1.2px at 90% 30%, rgba(255,255,255,.65) 50%, transparent), radial-gradient(1px 1px at 25% 35%, rgba(255,255,255,.4) 50%, transparent);animation:owl-twinkle 4s ease-in-out infinite\"></div>\n        <div style=\"position:absolute;left:8%;top:14%;width:46px;height:46px;border-radius:50%;background:radial-gradient(circle, rgba(244,242,231,0.9), rgba(244,242,231,0) 70%);filter:blur(1px);opacity:0.85\"></div>\n        <div style=\"position:absolute;left:0;right:0;bottom:0;height:38%;background:linear-gradient(180deg, transparent, #0a1810 70%);clip-path:polygon(0% 60%, 15% 40%, 32% 55%, 50% 30%, 68% 50%, 84% 35%, 100% 55%, 100% 100%, 0% 100%)\"></div>\n        <div style=\"position:absolute;left:18%;bottom:22%;width:5px;height:5px;border-radius:50%;background:var(--sun-300);animation:owl-pulse 3.4s ease-in-out infinite\"></div>\n        <div style=\"position:absolute;left:64%;bottom:26%;width:4px;height:4px;border-radius:50%;background:var(--sun-300);animation:owl-pulse 5.2s ease-in-out 1.1s infinite\"></div>\n        <div style=\"position:absolute;left:78%;bottom:20%;width:4px;height:4px;border-radius:50%;background:var(--sun-300);animation:owl-pulse 4.1s ease-in-out 2.3s infinite\"></div>\n        <div style=\"position:absolute;left:0;right:-40px;bottom:8%;height:22%;background-image:repeating-linear-gradient(100deg, rgba(140,178,60,0.22) 0 2px, transparent 2px 14px);transform-origin:bottom;animation:owl-sway 7s ease-in-out infinite\"></div>\n        <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(111,208,150,0.16)\"><svg width=\"90\" height=\"90\"><use href=\"#ic-owl\"></use></svg></div>\n      </div>\n    </div>\n  </section>\n\n  <!-- ============ PROJECTE (explanatory band) ============ -->\n  <section id=\"projecte\" data-screen-label=\"Projecte\" style=\"position:relative;background:transparent;padding:96px 0\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:0 32px;position:relative\">\n      <div style=\"max-width:760px;margin-bottom:56px\">\n        <div style=\"font-family:var(--font-mono);font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:0.14em;color:var(--sun-300);margin-bottom:14px\">El projecte UrbisAvis 3C</div>\n        <h2 style=\"font-family:var(--font-display);font-weight:700;font-size:clamp(2rem, 3.6vw, 3rem);line-height:1.05;letter-spacing:-0.03em;color:var(--cream-50);margin:0 0 18px\">Portem la vida nocturna dels ocells al cor del poble</h2>\n        <p style=\"font-size:17px;line-height:1.65;color:rgba(244,242,231,0.72);margin:0\">\n          Sentfores i La Guixa bateguen en un entorn agrícola ric, viu i ple de racons per descobrir. Aquest projecte neix des del cor del poble, de les nostres ganes com a veïns i veïnes de conèixer i protegir el patrimoni natural que compartim. No és només tecnologia; és una iniciativa completament nostra per convidar-nos a mirar cap amunt, a passejar pels nostres camins amb uns altres ulls i a entendre que el mosaic agrari de la Plana necessita aquests caçadors silenciosos tant com nosaltres necessitem la salut del nostre entorn.\n        </p>\n      </div>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:24px\">\n        <sc-for list=\"{{ pillars }}\" as=\"p\" hint-placeholder-count=\"4\">\n          <x-import component-from-global-scope=\"ArrelsNatureDesignSystem_1fc6c4.Card\" accent=\"{{ p.tone }}\" padding=\"32px\" hint-size=\"100%,220px\">\n            <div data-owl-perch=\"{{ p.perchAttr }}\" style=\"width:52px;height:52px;border-radius:var(--radius-lg);background:{{ p.soft }};color:{{ p.strong }};display:flex;align-items:center;justify-content:center;margin-bottom:18px\">\n              <svg width=\"26\" height=\"26\"><use href=\"#{{ p.icon }}\"></use></svg>\n            </div>\n            <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:20px;letter-spacing:-0.02em;color:var(--text-strong);margin:0 0 10px\">{{ p.title }}</h3>\n            <p style=\"margin:0;font-size:15px;line-height:1.6;color:var(--text-muted)\">{{ p.text }}</p>\n          </x-import>\n        </sc-for>\n      </div>\n    </div>\n  </section>\n\n  <!-- ============ ESPECIES ============ -->\n  <section id=\"especies\" data-screen-label=\"Especies\" style=\"background:transparent;color:var(--cream-50);padding:96px 0\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:0 32px\">\n      <div style=\"max-width:720px;margin-bottom:48px\">\n        <div style=\"font-family:var(--font-mono);font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:0.14em;color:var(--green-300);margin-bottom:14px\">Els protagonistes</div>\n        <h2 data-owl-perch=\"species-title\" style=\"font-family:var(--font-display);font-weight:700;font-size:clamp(2rem,3.6vw,3rem);line-height:1.05;letter-spacing:-0.03em;margin:0 0 16px\">Quatre caçadors silenciosos de la nit</h2>\n        <p style=\"font-size:17px;line-height:1.65;color:rgba(244,242,231,0.75);margin:0\">\n          Són els guardians de la Plana. Més enllà del mite, són aliats indispensables del pagès perquè controlen les plagues de rosegadors i insectes de manera natural. Volem sumar-nos i participar al programa RAPNOCAT i de la Reserva de Rapinyaires Nocturns de la Plana de Vic, posant el focus en aquestes quatre joies de la nostra fauna:\n        </p>\n      </div>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:20px\">\n        <sc-for list=\"{{ species }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div style=\"background:var(--forest-800);border:1px solid rgba(255,255,255,0.09);border-radius:var(--radius-lg);overflow:hidden;display:flex;flex-direction:column\">\n            <div style=\"position:relative;aspect-ratio:4/3\">\n              <image-slot id=\"{{ s.slotId }}\" shape=\"rect\" placeholder=\"{{ s.name }}\"></image-slot>\n            </div>\n            <div style=\"padding:18px 18px 20px;display:flex;flex-direction:column;gap:10px;flex:1\">\n              <div>\n                <div style=\"font-family:var(--font-display);font-weight:700;font-size:19px;letter-spacing:-0.02em\">{{ s.name }}</div>\n                <div style=\"font-style:italic;font-size:13.5px;color:var(--green-300)\">{{ s.sci }}</div>\n              </div>\n              <p style=\"margin:0;font-size:14px;line-height:1.55;color:rgba(244,242,231,0.75);flex:1\">{{ s.text }}</p>\n              <div style=\"font-family:var(--font-mono);font-size:11.5px;color:var(--sun-300);border-top:1px solid rgba(255,255,255,0.08);padding-top:10px\">{{ s.data }}</div>\n              <a href=\"{{ s.href }}\" target=\"_blank\" rel=\"noopener\" style=\"display:flex;align-items:center;gap:7px;text-decoration:none;color:var(--green-300);font-size:13.5px;font-weight:600\">\n                <svg width=\"15\" height=\"15\"><use href=\"#ic-headphones\"></use></svg> Escolta el seu cant a xeno-canto\n              </a>\n            </div>\n          </div>\n        </sc-for>\n      </div>\n    </div>\n  </section>\n\n  <!-- ============ COLABORA + CONTACTE ============ -->\n  <section id=\"colabora\" data-screen-label=\"Colabora\" style=\"position:relative;background:transparent;padding:96px 0\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:0 32px;position:relative\">\n      <div style=\"max-width:680px;margin-bottom:16px\">\n        <div style=\"font-family:var(--font-mono);font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:0.14em;color:var(--sun-300);margin-bottom:14px\">Acció local</div>\n        <h2 style=\"font-family:var(--font-display);font-weight:700;font-size:clamp(2rem,3.6vw,3rem);line-height:1.05;letter-spacing:-0.03em;color:var(--cream-50);margin:0 0 16px\">Aquest projecte és de tot el poble</h2>\n        <p style=\"font-size:17px;line-height:1.6;font-style:italic;color:rgba(244,242,231,0.72);margin:0 0 48px\">\"La ciència de veritat no es fa tancada en un laboratori; es fa obrint les portes a la gent. Tria com vols formar-ne part:\"</p>\n      </div>\n      <div style=\"display:grid;grid-template-columns:1.3fr 1fr;gap:40px;align-items:start\">\n        <div style=\"display:flex;flex-direction:column;gap:20px\">\n          <sc-for list=\"{{ collabItems }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <x-import component-from-global-scope=\"ArrelsNatureDesignSystem_1fc6c4.Card\" padding=\"26px\" hint-size=\"100%,150px\">\n              <div style=\"display:flex;gap:16px\">\n                <div style=\"width:44px;height:44px;flex-shrink:0;border-radius:var(--radius-md);background:var(--green-100);color:var(--green-700);display:flex;align-items:center;justify-content:center\">\n                  <svg width=\"22\" height=\"22\"><use href=\"#{{ c.icon }}\"></use></svg>\n                </div>\n                <div>\n                  <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--text-strong);margin:0 0 6px\">{{ c.title }}</h3>\n                  <p style=\"margin:0;font-size:15px;line-height:1.55;color:var(--text-muted)\">{{ c.text }}</p>\n                </div>\n              </div>\n            </x-import>\n          </sc-for>\n        </div>\n        <x-import component-from-global-scope=\"ArrelsNatureDesignSystem_1fc6c4.Card\" padding=\"32px\" hint-size=\"100%,420px\">\n          <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--text-strong);margin:0 0 18px\">Parlem-ne?</h3>\n          <a href=\"mailto:ausnocturnes-sentfores@gmail.com\" style=\"text-decoration:none;display:block;margin-bottom:18px\">\n            <x-import component-from-global-scope=\"ArrelsNatureDesignSystem_1fc6c4.Button\" variant=\"primary\" full=\"{{ true }}\" hint-size=\"100%,46px\">\n              <svg width=\"16\" height=\"16\" style=\"margin-right:4px\"><use href=\"#ic-mail\"></use></svg> ausnocturnes-sentfores@gmail.com\n            </x-import>\n          </a>\n          <div style=\"display:flex;align-items:center;gap:8px;font-size:14.5px;color:var(--text-muted);margin-bottom:24px\">\n            <svg width=\"16\" height=\"16\" style=\"color:var(--text-brand);flex-shrink:0\"><use href=\"#ic-pin\"></use></svg>\n            Sentfores - La Guixa · Vic\n          </div>\n          <div style=\"border-top:1px solid var(--border);padding-top:20px;display:flex;flex-direction:column;gap:14px;font-family:var(--font-mono);font-size:13px\">\n            <div style=\"display:flex;justify-content:space-between;gap:12px\"><span style=\"color:var(--text-muted)\">Campanya de Micromecenatge </span><span style=\"color:var(--text-strong);font-weight:600\">Objectiu 3.000 €</span></div>\n            <p style=\"margin:0;font-size:12px;color:var(--text-muted);line-height:1.5\">Destinat íntegrament a material tecnològic, caixes, plafons i pedagogia.</p>\n            <div style=\"display:flex;justify-content:space-between;gap:12px\"><span style=\"color:var(--text-muted)\">Intervencions invasives</span><span style=\"color:var(--green-700);font-weight:600\">0</span></div>\n            <p style=\"margin:0;font-size:12px;color:var(--text-muted);line-height:1.5\">Respecte absolut als cicles naturals.</p>\n            <div style=\"display:flex;justify-content:space-between;gap:12px\"><span style=\"color:var(--text-muted)\">Ètica de dades</span></div>\n            <p style=\"margin:0;font-size:12px;color:var(--text-muted);line-height:1.5\">Les teves dades no es venen ni tenen finalitat comercial. Són ciència oberta per al bé comú.</p>\n          </div>\n        </x-import>\n      </div>\n    </div>\n  </section>\n\n  <!-- ============ EASTER EGG ============ -->\n  <section data-screen-label=\"EasterEgg\" style=\"position:relative;background:transparent;padding:56px 0;border-top:1px solid rgba(255,255,255,0.1);border-bottom:1px solid rgba(255,255,255,0.1)\">\n    <div style=\"max-width:720px;margin:0 auto;padding:0 32px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:18px;position:relative\">\n      <p style=\"margin:0;font-size:15px;font-style:italic;color:rgba(244,242,231,0.65)\">Hi ha qui diu que si et quedes en silenci a la web, passa alguna cosa... Provem-ho?</p>\n      <button onclick=\"{{ toggleLights }}\" style=\"display:inline-flex;align-items:center;gap:9px;padding:0 22px;height:46px;border-radius:var(--radius-pill);border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.06);color:var(--cream-50);font-family:var(--font-body);font-weight:600;font-size:15px;cursor:pointer;box-shadow:var(--shadow-sm)\">\n        <svg width=\"17\" height=\"17\"><use href=\"#ic-moon\"></use></svg> Apaga els llums\n      </button>\n    </div>\n  </section>\n\n  <!-- ============ FOOTER ============ -->\n  <footer data-screen-label=\"Footer\" style=\"position:relative;background:rgba(6,9,20,0.5);color:var(--cream-50);padding:64px 0 36px\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:0 32px\">\n      <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:18px\" data-owl-perch=\"footer-title\">\n        <span style=\"color:var(--green-300);display:inline-flex\"><svg width=\"22\" height=\"22\"><use href=\"#ic-owl\"></use></svg></span>\n        <span style=\"font-family:var(--font-display);font-weight:800;font-size:19px;letter-spacing:-0.03em\">Aus Nocturnes Sentfores <span style=\"color:var(--green-300)\">· UrbisAvis 3C</span></span>\n      </div>\n      <p style=\"max-width:640px;font-size:14px;line-height:1.6;color:rgba(244,242,231,0.65);background:rgba(255,255,255,0.05);border-left:2px solid var(--green-600);padding:14px 18px;border-radius:0 var(--radius-md) var(--radius-md) 0;margin:0 0 40px\">\n        Nota de protecció: per motius de seguretat i conservació de les espècies, la ubicació exacta d'algunes de les caixes niu monitorades no es farà pública per evitar visites o molèsties durant l'època de cria. Agraïm la vostra comprensió.\n      </p>\n      <div style=\"display:flex;flex-wrap:wrap;gap:12px;margin-bottom:32px\">\n        <sc-for list=\"{{ supportLogos }}\" as=\"l\" hint-placeholder-count=\"4\">\n          <span style=\"font-family:var(--font-mono);font-size:12px;letter-spacing:0.04em;color:rgba(244,242,231,0.75);border:1px solid rgba(255,255,255,0.14);border-radius:var(--radius-pill);padding:8px 16px\">{{ l }}</span>\n        </sc-for>\n      </div>\n      <div style=\"border-top:1px solid rgba(255,255,255,0.1);padding-top:22px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-family:var(--font-mono);font-size:12px;color:rgba(244,242,231,0.5)\">\n        <span>© 2026 Aus Nocturnes Sentfores · UrbisAvis 3C</span>\n        <span>Ciència ciutadana oberta · Dades sense ús comercial</span>\n      </div>\n    </div>\n  </footer>\n\n  <!-- blackout overlay for the easter egg -->\n  <sc-if value=\"{{ lightsOff }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ toggleLights }}\" style=\"position:fixed;inset:0;background:rgba(6,10,8,0.88);z-index:9998;cursor:pointer;animation:owl-blackout-in 400ms ease-out;display:flex;align-items:flex-end;justify-content:center;padding-bottom:64px\">\n      <p style=\"font-family:var(--font-mono);font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(244,242,231,0.55)\">Torna a tocar per encendre els llums</p>\n    </div>\n  </sc-if>\n\n</div>\n\n</x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { lightsOff: false };\n\n  componentDidMount() {\n    const perches = [\n      '[data-owl-perch=\"logo\"]',\n      '[data-owl-perch=\"hero-h1\"]',\n      '[data-owl-perch=\"pillar-tech\"]',\n      '[data-owl-perch=\"species-title\"]',\n      '[data-owl-perch=\"footer-title\"]',\n    ];\n    const tryInit = () => {\n      if (window.UrbisOwl && window.ArrelsNatureDesignSystem_1fc6c4) {\n        window.UrbisOwl.init({ perches });\n      } else {\n        setTimeout(tryInit, 60);\n      }\n    };\n    tryInit();\n  }\n\n  toggleLights = () => {\n    this.setState((s) => {\n      const next = !s.lightsOff;\n      if (next && window.UrbisOwl) window.UrbisOwl.startHunt();\n      return { lightsOff: next };\n    });\n  };\n\n  renderVals() {\n    if (!this._stars) {\n      this._stars = Array.from({ length: 90 }, () => ({\n        left: (Math.random() * 100).toFixed(4),\n        top: (Math.random() * 100).toFixed(4),\n        delay: (Math.random() * 4).toFixed(4),\n      }));\n    }\n    return {\n      lightsOff: this.state.lightsOff,\n      toggleLights: this.toggleLights,\n      stars: this._stars,\n      pillars: [\n        { icon: 'ic-cam', tone: 'green', soft: 'var(--green-100)', strong: 'var(--green-700)', perchAttr: 'pillar-tech',\n          title: 'Tres ulls a la foscor', text: \"El nostre objectiu és instal·lar tres caixes niu equipades amb càmeres d'alta definició i visió nocturna per infrarojos. Quan estiguin en marxa, ens permetran estudiar la nidificació, l'alimentació i el comportament dels ocells en temps real i en obert, sota una premissa irrenunciable: zero intervencions i zero molèsties. Estem plantant la llavor per fer-ho possible.\" },\n        { icon: 'ic-route', tone: 'sky', soft: 'var(--sky-100)', strong: 'var(--sky-700)', perchAttr: 'pillar-route',\n          title: 'Una ruta a peu', text: 'La ciència i la descoberta també es fan caminant. Volem traçar un itinerari geolocalitzat pels camins de Sentfores i La Guixa, pensat per recórrer a peu a la vora de la natura del nostre entorn. Una passejada tranquil·la, ideal per a fer en família, veïns o curiosos, que ens connectarà directament amb el paisatge on viuen i volen les nostres aus nocturnes.' },\n        { icon: 'ic-pin', tone: 'sun', soft: 'var(--sun-100)', strong: 'var(--sun-700)', perchAttr: 'pillar-plafons',\n          title: 'Sis plafons informatius', text: \"Al llarg d'aquesta ruta, el nostre objectiu és instal·lar 6 plafons que serviran com a finestres de coneixement al mig del camp. Cada plafó estarà dedicat a la nostra fauna i entorn, on es podran escanejar codis QR per ampliar la informació, saber quines aus nien a cada racó de la Plana o escoltar els seus cants. Una eina educativa compartida a l'abast de l'escola i de tot el veïnat.\" },\n        { icon: 'ic-users', tone: 'bloom', soft: 'var(--bloom-100)', strong: 'var(--bloom-700)', perchAttr: 'pillar-comunitat',\n          title: 'Ciència compartida', text: \"Aquest projecte és de tothom. L'Escola Sentfores podrà utilitzar aquestes dades a l'aula, i el veïnat es converteix en els 'ulls de la nit', aprenent a respectar l'entorn i recollint dades vitals per a la conservació.\" },\n      ],\n      species: [\n        { name: 'Xot', sci: 'Otus scops', slotId: 'owl-xot', data: 'Diàmetre d\\u2019entrada: 6 cm',\n          text: \"El més petit i l'únic migrador. Passa l'hivern a l'Àfrica i torna a la primavera. El seu xiulet monòton i compassat és la banda sonora indiscutible de les nostres nits d'estiu.\",\n          href: 'https://xeno-canto.org/species/Otus-scops' },\n        { name: 'Mussol comú', sci: 'Athene noctua', slotId: 'owl-mussol', data: 'Diàmetre d\\u2019entrada: 7 cm',\n          text: 'Menut, d\\u2019ulls grocs i caràcter valent. És el gran bioindicador dels camps i oliverars. Molt lligat a l\\u2019activitat humana, sovint el veuràs dret sobre els pals de la llum o les fites al capvespre.',\n          href: 'https://xeno-canto.org/species/Athene-noctua' },\n        { name: 'Gamarús', sci: 'Strix aluco', slotId: 'owl-gamarus', data: 'Diàmetre d\\u2019entrada: 12-15 cm',\n          text: \"El senyor dels boscos de ribera i zones arbrades. És un caçador forestal pur, molt fidel al seu territori. El seu udol és el clàssic 'uuh' misteriós que fa ressonar la nit.\",\n          href: 'https://xeno-canto.org/species/Strix-aluco' },\n        { name: 'Òliba', sci: 'Tyto alba', slotId: 'owl-oliba', data: 'Entrada específica per a òliba (rectangular / gran)',\n          text: 'Amb la seva silueta blanca i el seu vol fantasmal i absolutament insonor, és l\\u2019esperit dels masos vells. Avui es troba en greu retrocés i és extremadament vulnerable a les alteracions del seu entorn.',\n          href: 'https://xeno-canto.org/species/Tyto-alba' },\n      ],\n      collabItems: [\n        { icon: 'ic-megaphone', title: 'Difon el projecte', text: \"Parla'n al bar, comparteix les imatges del niu al grup de WhatsApp de la família o etiqueta'ns a les xarxes. Com més gent sàpiga que compartim el poble amb aquestes aus, més les protegirem.\" },\n        { icon: 'ic-eye', title: 'Aporta observacions', text: 'Si sents un cant des de la finestra o veus un mussol al capvespre, fes-ho comptar. T\\u2019ensenyem a utilitzar aplicacions com Ocells dels Jardins de l\\u2019ICO o eBird per registrar les teves troballes.' },\n        { icon: 'ic-handshake', title: \"Suma't com a entitat o escola\", text: \"Ets docent? Fas part d'una associació? Vols ajudar-nos a mantenir la ruta neta o col·locar noves caixes niu? Escriu-nos, l'equip és obert a tothom.\" },\n      ],\n      supportLogos: ['GNO-ICHN · RAPNOCAT', 'Escola Sentfores', 'CCVIC La Guixa', 'Associació de Veïns de la Guixa'],\n    };\n  }\n}\n\n<\/script>\n\n\n</body></html>"
</script>
